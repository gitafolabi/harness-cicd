service:
  identifier: boutique_frontend
  name: "Boutique – Frontend"
  orgIdentifier: default
  projectIdentifier: BoutiqueApp
  serviceDefinition:
    type: Kubernetes
    spec:
      manifests:
        - manifest:
            identifier: frontend_k8s
            type: K8sManifest
            spec:
              store:
                type: Github
                spec:
                  connectorRef: github_boutique
                  gitFetchType: Branch
                  repoName: harness-cicd
                  branch: main
                  paths:
                    - k8s/frontend.yaml
                    - k8s/ingress.yaml
              skipResourceVersioning: false
              enableDeclarativeRollback: true
      artifacts:
        primary:
          primaryArtifactRef: frontend_docker
          sources:
            - identifier: frontend_docker
              type: DockerRegistry
              spec:
                connectorRef: dockerhub_boutique
                imagePath: avurlerby/frontend
                tag: <+input>
