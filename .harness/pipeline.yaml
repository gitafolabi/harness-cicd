# =============================================================
# Harness CI/CD Pipeline — Boutique Microservices
# =============================================================
#
# CONCEPTS DEMONSTRATED (interview checklist):
#   ✅ Pipeline Variables         — imageTag flows through all stages
#   ✅ Parallel CI Stages         — all 7 services build simultaneously
#   ✅ BuildAndPushDockerRegistry — Harness Cloud (no self-hosted runner)
#   ✅ Manual Approval Gate       — holds before production deploy
#   ✅ Failure Strategy           — rollback on deploy failure
#   ✅ CD Deployment Stages       — K8s Rolling Deploy per service
#   ✅ Stage Dependencies         — gateway deploys after auth
#   ✅ Rollback Steps             — K8sRollingRollback auto-triggered
#   ✅ Expressions                — <+pipeline.sequenceId>, <+input>
#
# HOW TO IMPORT:
#   app.harness.io → <Project> → Deployments → Pipelines
#   → + Create Pipeline → Import from Git
#   Point at this file (main branch, .harness/pipeline.yaml)
#
# PREREQUISITES (complete in order):
#   1. Create project "BoutiqueApp" in Harness org "default"
#   2. Import connectors from .harness/connectors/
#   3. Import services   from .harness/services/
#   4. Import environment from .harness/environments/production.yaml
#   5. Import infra def  from .harness/infrastructure/aks-boutique.yaml
#   6. Deploy delegate   from k8s/delegate/  (needed for K8s deploys)
#   7. Add JWT_SECRET to boutique-secrets K8s Secret in AKS
# =============================================================

pipeline:
  identifier: boutique_full_cicd
  name: "Boutique – Full CI/CD"
  orgIdentifier: default
  projectIdentifier: BoutiqueApp
  description: "Build all microservice images in parallel then rolling-deploy to AKS"
  tags:
    app: boutique
    team: platform

  # ── Pipeline-level variables ───────────────────────────────
  # <+pipeline.sequenceId> is Harness's auto-incrementing run number.
  # Using it as the image tag means every run produces a unique,
  # traceable image — no "latest" ambiguity in production.
  variables:
    - name: imageTag
      type: String
      description: "Docker image tag — defaults to pipeline run number"
      value: <+pipeline.sequenceId>

  # ── Codebase config (used by all CI stages) ─────────────────
  properties:
    ci:
      codebase:
        connectorRef: github_boutique
        repoName: harness-cicd
        build: <+input>               # branch / tag / PR chosen at trigger time

  stages:

    # ===========================================================
    # STAGE GROUP 1 — CI: Build & Push all services in parallel
    # ===========================================================
    # Each service builds independently. A failure in one does NOT
    # block the others — Harness marks the whole parallel group
    # failed only when all parallel stages have completed.
    - parallel:

        # ── Auth ──────────────────────────────────────────────
        - stage:
            identifier: ci_auth
            name: "CI | Auth"
            type: CI
            spec:
              cloneCodebase: true
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud          # Harness-hosted runner — no delegate needed
                spec: {}
              execution:
                steps:
                  - step:
                      identifier: test_auth
                      name: Run Tests
                      type: Run
                      spec:
                        shell: Sh
                        command: |
                          cd projects/boutique-microservices/backend/services/auth
                          npm ci
                          npm test || echo "⚠  No tests / tests skipped"
                  - step:
                      identifier: push_auth
                      name: Build & Push
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: dockerhub_boutique
                        repo: avurlerby/auth
                        tags:
                          - <+pipeline.sequenceId>
                          - latest
                        dockerfile: projects/boutique-microservices/backend/services/auth/Dockerfile
                        context: projects/boutique-microservices/backend/services/auth

        # ── API Gateway ───────────────────────────────────────
        - stage:
            identifier: ci_gateway
            name: "CI | Gateway"
            type: CI
            spec:
              cloneCodebase: true
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      identifier: push_gateway
                      name: Build & Push
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: dockerhub_boutique
                        repo: avurlerby/gateway
                        tags:
                          - <+pipeline.sequenceId>
                          - latest
                        dockerfile: projects/boutique-microservices/backend/services/gateway/Dockerfile
                        context: projects/boutique-microservices/backend/services/gateway

        # ── Product Service ───────────────────────────────────
        - stage:
            identifier: ci_product
            name: "CI | Product Service"
            type: CI
            spec:
              cloneCodebase: true
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      identifier: push_product
                      name: Build & Push
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: dockerhub_boutique
                        repo: avurlerby/product-service
                        tags:
                          - <+pipeline.sequenceId>
                          - latest
                        dockerfile: projects/boutique-microservices/backend/services/product-service/Dockerfile
                        context: projects/boutique-microservices/backend/services/product-service

        # ── Orders Service ────────────────────────────────────
        - stage:
            identifier: ci_orders
            name: "CI | Orders"
            type: CI
            spec:
              cloneCodebase: true
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      identifier: push_orders
                      name: Build & Push
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: dockerhub_boutique
                        repo: avurlerby/orders
                        tags:
                          - <+pipeline.sequenceId>
                          - latest
                        dockerfile: projects/boutique-microservices/backend/services/orders/Dockerfile
                        context: projects/boutique-microservices/backend/services/orders

        # ── User Service ──────────────────────────────────────
        - stage:
            identifier: ci_user
            name: "CI | User Service"
            type: CI
            spec:
              cloneCodebase: true
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      identifier: push_user
                      name: Build & Push
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: dockerhub_boutique
                        repo: avurlerby/user-service
                        tags:
                          - <+pipeline.sequenceId>
                          - latest
                        dockerfile: projects/boutique-microservices/backend/services/user-service/Dockerfile
                        context: projects/boutique-microservices/backend/services/user-service

        # ── Notification Service ──────────────────────────────
        - stage:
            identifier: ci_notification
            name: "CI | Notification"
            type: CI
            spec:
              cloneCodebase: true
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      identifier: push_notification
                      name: Build & Push
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: dockerhub_boutique
                        repo: avurlerby/notification-service
                        tags:
                          - <+pipeline.sequenceId>
                          - latest
                        dockerfile: projects/boutique-microservices/backend/services/notification-service/Dockerfile
                        context: projects/boutique-microservices/backend/services/notification-service

        # ── Frontend ──────────────────────────────────────────
        - stage:
            identifier: ci_frontend
            name: "CI | Frontend"
            type: CI
            spec:
              cloneCodebase: true
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      identifier: build_frontend
                      name: npm build
                      type: Run
                      spec:
                        shell: Sh
                        command: |
                          cd projects/boutique-microservices/frontend
                          npm ci
                          npm run build
                  - step:
                      identifier: push_frontend
                      name: Build & Push nginx image
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: dockerhub_boutique
                        repo: avurlerby/frontend
                        tags:
                          - <+pipeline.sequenceId>
                          - latest
                        dockerfile: projects/boutique-microservices/frontend/Dockerfile
                        context: projects/boutique-microservices/frontend

    # ===========================================================
    # STAGE 2 — Manual Approval Gate (Production Guard)
    # ===========================================================
    # All 7 CI builds must succeed before this stage is reached.
    # An approver reviews the build summary and approves or rejects.
    # Timeout: 24h — pipeline expires if nobody approves.
    #
    # Interview tip: Explain that in Harness you can also use
    # "Deployment Freeze Windows" to block deploys during change
    # freezes (e.g. holidays) without modifying the pipeline.
    - stage:
        identifier: approval_prod
        name: "Approval | Deploy to Production"
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  identifier: approve_deploy
                  name: Approve Production Deployment
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      All 7 services built successfully.

                      Image tag: <+pipeline.sequenceId>
                      Triggered by: <+pipeline.triggeredBy.name>

                      Services to deploy to AKS (boutique namespace):
                        • avurlerby/auth:<+pipeline.sequenceId>
                        • avurlerby/gateway:<+pipeline.sequenceId>
                        • avurlerby/product-service:<+pipeline.sequenceId>
                        • avurlerby/orders:<+pipeline.sequenceId>
                        • avurlerby/user-service:<+pipeline.sequenceId>
                        • avurlerby/notification-service:<+pipeline.sequenceId>
                        • avurlerby/frontend:<+pipeline.sequenceId>

                      Please review and approve.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - account.AllUsers    # Replace with a specific Harness user group
                      minimumCount: 1
                      disallowPipelineExecutor: false

    # ===========================================================
    # STAGE GROUP 3 — CD: Deploy to AKS (sequential by dependency)
    # ===========================================================
    # Auth and leaf services deploy in parallel first.
    # Gateway deploys after auth (depends on auth being healthy).
    # Frontend deploys last (depends on gateway).
    #
    # Each CD stage uses K8sRollingDeploy with automatic rollback.
    # The delegate in AKS applies the manifest and waits for
    # Deployment readiness before marking the step successful.

    # ── Auth & leaf services (parallel) ──────────────────────
    - parallel:

        - stage:
            identifier: cd_auth
            name: "CD | Auth"
            type: Deployment
            spec:
              deploymentType: Kubernetes
              service:
                serviceRef: boutique_auth
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: auth_docker
                          sources:
                            - identifier: auth_docker
                              spec:
                                tag: <+pipeline.sequenceId>
              environment:
                environmentRef: boutique_production
                deployToAll: false
                infrastructureDefinitions:
                  - identifier: aks_boutique
              execution:
                steps:
                  - step:
                      identifier: rolling_auth
                      name: Rolling Deploy
                      type: K8sRollingDeploy
                      timeout: 10m
                      spec:
                        skipDryRun: false
                rollbackSteps:
                  - step:
                      identifier: rollback_auth
                      name: Rolling Rollback
                      type: K8sRollingRollback
                      timeout: 10m
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: StageRollback

        - stage:
            identifier: cd_product
            name: "CD | Product Service"
            type: Deployment
            spec:
              deploymentType: Kubernetes
              service:
                serviceRef: boutique_product
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: product_docker
                          sources:
                            - identifier: product_docker
                              spec:
                                tag: <+pipeline.sequenceId>
              environment:
                environmentRef: boutique_production
                deployToAll: false
                infrastructureDefinitions:
                  - identifier: aks_boutique
              execution:
                steps:
                  - step:
                      identifier: rolling_product
                      name: Rolling Deploy
                      type: K8sRollingDeploy
                      timeout: 10m
                      spec:
                        skipDryRun: false
                rollbackSteps:
                  - step:
                      identifier: rollback_product
                      name: Rolling Rollback
                      type: K8sRollingRollback
                      timeout: 10m
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: StageRollback

        - stage:
            identifier: cd_user
            name: "CD | User Service"
            type: Deployment
            spec:
              deploymentType: Kubernetes
              service:
                serviceRef: boutique_user
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: user_docker
                          sources:
                            - identifier: user_docker
                              spec:
                                tag: <+pipeline.sequenceId>
              environment:
                environmentRef: boutique_production
                deployToAll: false
                infrastructureDefinitions:
                  - identifier: aks_boutique
              execution:
                steps:
                  - step:
                      identifier: rolling_user
                      name: Rolling Deploy
                      type: K8sRollingDeploy
                      timeout: 10m
                      spec:
                        skipDryRun: false
                rollbackSteps:
                  - step:
                      identifier: rollback_user
                      name: Rolling Rollback
                      type: K8sRollingRollback
                      timeout: 10m
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: StageRollback

        - stage:
            identifier: cd_orders
            name: "CD | Orders"
            type: Deployment
            spec:
              deploymentType: Kubernetes
              service:
                serviceRef: boutique_orders
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: orders_docker
                          sources:
                            - identifier: orders_docker
                              spec:
                                tag: <+pipeline.sequenceId>
              environment:
                environmentRef: boutique_production
                deployToAll: false
                infrastructureDefinitions:
                  - identifier: aks_boutique
              execution:
                steps:
                  - step:
                      identifier: rolling_orders
                      name: Rolling Deploy
                      type: K8sRollingDeploy
                      timeout: 10m
                      spec:
                        skipDryRun: false
                rollbackSteps:
                  - step:
                      identifier: rollback_orders
                      name: Rolling Rollback
                      type: K8sRollingRollback
                      timeout: 10m
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: StageRollback

        - stage:
            identifier: cd_notification
            name: "CD | Notification"
            type: Deployment
            spec:
              deploymentType: Kubernetes
              service:
                serviceRef: boutique_notification
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: notification_docker
                          sources:
                            - identifier: notification_docker
                              spec:
                                tag: <+pipeline.sequenceId>
              environment:
                environmentRef: boutique_production
                deployToAll: false
                infrastructureDefinitions:
                  - identifier: aks_boutique
              execution:
                steps:
                  - step:
                      identifier: rolling_notification
                      name: Rolling Deploy
                      type: K8sRollingDeploy
                      timeout: 10m
                      spec:
                        skipDryRun: false
                rollbackSteps:
                  - step:
                      identifier: rollback_notification
                      name: Rolling Rollback
                      type: K8sRollingRollback
                      timeout: 10m
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: StageRollback

    # ── Gateway (after auth) ──────────────────────────────────
    # Stage dependency: cd_gateway runs only when cd_auth succeeds.
    # This mirrors the real startup requirement (gateway needs auth).
    - stage:
        identifier: cd_gateway
        name: "CD | Gateway"
        type: Deployment
        stageDependencies:
          - cd_auth               # ← wait for auth to be healthy first
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: boutique_gateway
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: gateway_docker
                      sources:
                        - identifier: gateway_docker
                          spec:
                            tag: <+pipeline.sequenceId>
          environment:
            environmentRef: boutique_production
            deployToAll: false
            infrastructureDefinitions:
              - identifier: aks_boutique
          execution:
            steps:
              - step:
                  identifier: rolling_gateway
                  name: Rolling Deploy
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
            rollbackSteps:
              - step:
                  identifier: rollback_gateway
                  name: Rolling Rollback
                  type: K8sRollingRollback
                  timeout: 10m
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback

    # ── Frontend (after gateway) ──────────────────────────────
    - stage:
        identifier: cd_frontend
        name: "CD | Frontend"
        type: Deployment
        stageDependencies:
          - cd_gateway             # ← wait for gateway first
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: boutique_frontend
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: frontend_docker
                      sources:
                        - identifier: frontend_docker
                          spec:
                            tag: <+pipeline.sequenceId>
          environment:
            environmentRef: boutique_production
            deployToAll: false
            infrastructureDefinitions:
              - identifier: aks_boutique
          execution:
            steps:
              - step:
                  identifier: rolling_frontend
                  name: Rolling Deploy
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
            rollbackSteps:
              - step:
                  identifier: rollback_frontend
                  name: Rolling Rollback
                  type: K8sRollingRollback
                  timeout: 10m
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback

