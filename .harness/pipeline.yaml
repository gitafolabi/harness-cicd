pipeline:
  identifier: boutique_full_cicd
  name: Boutique Full CICD
  orgIdentifier: default
  projectIdentifier: BoutiqueApp
  description: CD pipeline triggered by GitHub Actions CI – approves and deploys to AKS
  tags:
    app: boutique
  variables:
    - name: imageTag
      type: String
      description: Docker image tag (git SHA passed from GitHub Actions)
      value: <+input>
  stages:

    - stage:
        identifier: approval_prod
        name: Approve Production Deploy
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  identifier: approve_deploy
                  name: Approve Production Deployment
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: "Images built at tag <+pipeline.variables.imageTag>. Approve to deploy to AKS boutique namespace."
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - Boutique_Approvers
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
        failureStrategies: []

    - parallel:
        - stage:
            identifier: cd_auth
            name: CD Auth
            type: Deployment
            spec:
              deploymentType: Kubernetes
              service:
                serviceRef: boutique_auth
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: auth_docker
                          sources:
                            - identifier: auth_docker
                              spec:
                                tag: <+pipeline.variables.imageTag>
              environment:
                environmentRef: boutique_production
                deployToAll: false
                infrastructureDefinitions:
                  - identifier: aks_boutique
              execution:
                steps:
                  - step:
                      identifier: rolling_deploy_auth
                      name: Rolling Deploy
                      type: K8sRollingDeploy
                      timeout: 10m
                      spec:
                        skipDryRun: false
                rollbackSteps:
                  - step:
                      identifier: rolling_rollback_auth
                      name: Rolling Rollback
                      type: K8sRollingRollback
                      timeout: 10m
                      spec: {}
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: StageRollback

        - stage:
            identifier: cd_product
            name: CD Product Service
            type: Deployment
            spec:
              deploymentType: Kubernetes
              service:
                serviceRef: boutique_product
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: product_docker
                          sources:
                            - identifier: product_docker
                              spec:
                                tag: <+pipeline.variables.imageTag>
              environment:
                environmentRef: boutique_production
                deployToAll: false
                infrastructureDefinitions:
                  - identifier: aks_boutique
              execution:
                steps:
                  - step:
                      identifier: rolling_deploy_product
                      name: Rolling Deploy
                      type: K8sRollingDeploy
                      timeout: 10m
                      spec:
                        skipDryRun: false
                rollbackSteps:
                  - step:
                      identifier: rolling_rollback_product
                      name: Rolling Rollback
                      type: K8sRollingRollback
                      timeout: 10m
                      spec: {}
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: StageRollback

        - stage:
            identifier: cd_orders
            name: CD Orders
            type: Deployment
            spec:
              deploymentType: Kubernetes
              service:
                serviceRef: boutique_orders
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: orders_docker
                          sources:
                            - identifier: orders_docker
                              spec:
                                tag: <+pipeline.variables.imageTag>
              environment:
                environmentRef: boutique_production
                deployToAll: false
                infrastructureDefinitions:
                  - identifier: aks_boutique
              execution:
                steps:
                  - step:
                      identifier: rolling_deploy_orders
                      name: Rolling Deploy
                      type: K8sRollingDeploy
                      timeout: 10m
                      spec:
                        skipDryRun: false
                rollbackSteps:
                  - step:
                      identifier: rolling_rollback_orders
                      name: Rolling Rollback
                      type: K8sRollingRollback
                      timeout: 10m
                      spec: {}
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: StageRollback

        - stage:
            identifier: cd_user
            name: CD User Service
            type: Deployment
            spec:
              deploymentType: Kubernetes
              service:
                serviceRef: boutique_user
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: user_docker
                          sources:
                            - identifier: user_docker
                              spec:
                                tag: <+pipeline.variables.imageTag>
              environment:
                environmentRef: boutique_production
                deployToAll: false
                infrastructureDefinitions:
                  - identifier: aks_boutique
              execution:
                steps:
                  - step:
                      identifier: rolling_deploy_user
                      name: Rolling Deploy
                      type: K8sRollingDeploy
                      timeout: 10m
                      spec:
                        skipDryRun: false
                rollbackSteps:
                  - step:
                      identifier: rolling_rollback_user
                      name: Rolling Rollback
                      type: K8sRollingRollback
                      timeout: 10m
                      spec: {}
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: StageRollback

        - stage:
            identifier: cd_notification
            name: CD Notification Service
            type: Deployment
            spec:
              deploymentType: Kubernetes
              service:
                serviceRef: boutique_notification
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: notification_docker
                          sources:
                            - identifier: notification_docker
                              spec:
                                tag: <+pipeline.variables.imageTag>
              environment:
                environmentRef: boutique_production
                deployToAll: false
                infrastructureDefinitions:
                  - identifier: aks_boutique
              execution:
                steps:
                  - step:
                      identifier: rolling_deploy_notification
                      name: Rolling Deploy
                      type: K8sRollingDeploy
                      timeout: 10m
                      spec:
                        skipDryRun: false
                rollbackSteps:
                  - step:
                      identifier: rolling_rollback_notification
                      name: Rolling Rollback
                      type: K8sRollingRollback
                      timeout: 10m
                      spec: {}
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: StageRollback

    - stage:
        identifier: cd_gateway
        name: CD Gateway
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: boutique_gateway
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: gateway_docker
                      sources:
                        - identifier: gateway_docker
                          spec:
                            tag: <+pipeline.variables.imageTag>
          environment:
            environmentRef: boutique_production
            deployToAll: false
            infrastructureDefinitions:
              - identifier: aks_boutique
          execution:
            steps:
              - step:
                  identifier: rolling_deploy_gateway
                  name: Rolling Deploy
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
            rollbackSteps:
              - step:
                  identifier: rolling_rollback_gateway
                  name: Rolling Rollback
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback

    - stage:
        identifier: cd_frontend
        name: CD Frontend
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: boutique_frontend
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: frontend_docker
                      sources:
                        - identifier: frontend_docker
                          spec:
                            tag: <+pipeline.variables.imageTag>
          environment:
            environmentRef: boutique_production
            deployToAll: false
            infrastructureDefinitions:
              - identifier: aks_boutique
          execution:
            steps:
              - step:
                  identifier: rolling_deploy_frontend
                  name: Rolling Deploy
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
            rollbackSteps:
              - step:
                  identifier: rolling_rollback_frontend
                  name: Rolling Rollback
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
