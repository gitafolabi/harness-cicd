apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: boutique
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: gateway
          image: <+artifact.image>
          ports:
            - containerPort: 3001
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: AUTH_SERVICE_URL
              value: "http://auth:3002"
            - name: PRODUCTS_SERVICE_URL
              value: "http://product-service:3003"
            - name: ORDERS_SERVICE_URL
              value: "http://orders:3005"
            - name: USERS_SERVICE_URL
              value: "http://user-service:3006"
            - name: OTLP_ENDPOINT
              value: "http://jaeger:4318/v1/traces"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: boutique
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
