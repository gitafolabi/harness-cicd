# =============================================================
# Harness Delegate — AKS Deployment
# =============================================================
#
# The Harness Delegate is the agent that runs INSIDE your AKS
# cluster and connects outbound to app.harness.io.  It is what
# allows Harness to run kubectl, helm, and other commands
# against your cluster without exposing an inbound port.
#
# HOW TO INSTALL (recommended — auto-generates this YAML):
#   app.harness.io → Account Settings → Delegates → + New Delegate
#   → Kubernetes → Name: boutique-delegate → Download YAML
#   → kubectl apply -f harness-delegate.yml
#
# OR deploy this file manually after filling in the two secrets:
#   1. DELEGATE_TOKEN  — from Harness UI → Account Settings → Delegates → Tokens
#   2. ACCOUNT_ID      — from app.harness.io URL: /account/<ACCOUNT_ID>/
#
# kubectl create secret generic harness-delegate-secret \
#   -n harness-delegate \
#   --from-literal=token=<YOUR_DELEGATE_TOKEN> \
#   --from-literal=accountId=<YOUR_ACCOUNT_ID>
#
# Then: kubectl apply -f k8s/delegate/
# =============================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: harness-delegate
  namespace: harness-delegate

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: harness-delegate-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin           # Needs full cluster access to deploy to any namespace
subjects:
  - kind: ServiceAccount
    name: harness-delegate
    namespace: harness-delegate

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boutique-delegate
  namespace: harness-delegate
  labels:
    harness.io/name: boutique-delegate
spec:
  replicas: 1
  selector:
    matchLabels:
      harness.io/name: boutique-delegate
  template:
    metadata:
      labels:
        harness.io/name: boutique-delegate
    spec:
      serviceAccountName: harness-delegate
      terminationGracePeriodSeconds: 600
      containers:
        - name: delegate
          image: harness/delegate:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "0.5"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3460
              scheme: HTTP
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /api/health
              port: 3460
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 15
          env:
            # ── Required ─────────────────────────────────────
            - name: DELEGATE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: harness-delegate-secret
                  key: token
            - name: ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: harness-delegate-secret
                  key: accountId
            - name: MANAGER_HOST_AND_PORT
              value: https://app.harness.io
            - name: DELEGATE_NAME
              value: boutique-delegate
            - name: NEXT_GEN
              value: "true"
            - name: DELEGATE_TYPE
              value: KUBERNETES
            - name: DEPLOY_MODE
              value: KUBERNETES
            # ── Optional tuning ──────────────────────────────
            - name: LOG_STREAMING_SERVICE_URL
              value: https://app.harness.io/log-service/
            - name: DELEGATE_TAGS
              value: "boutique,aks,production"
